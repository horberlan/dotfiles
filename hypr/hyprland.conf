$configs = $HOME/.config/hypr/configs

source=$configs/Settings.conf
source=$configs/Keybinds.conf

$UserConfigs = $HOME/.config/hypr/UserConfigs

source= $UserConfigs/Startup_Apps.conf
source= $UserConfigs/ENVariables.conf
source= $UserConfigs/Monitors.conf
source= $UserConfigs/Laptops.conf
source= $UserConfigs/LaptopDisplay.conf
source= $UserConfigs/WindowRules.conf
source= $UserConfigs/UserDecorAnimations.conf
source= $UserConfigs/UserKeybinds.conf
source= $UserConfigs/UserSettings.conf
source= $UserConfigs/WorkspaceRules.conf
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sh -c 'sleep 2 && killall -e xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-desktop-portal 2>/dev/null && systemctl --user restart xdg-desktop-portal.service && sleep 1 && systemctl --user restart xdg-desktop-portal-hyprland.service && sleep 1 && systemctl --user restart xdg-desktop-portal-gtk.service'
xwayland {
force_zero_scaling = true
}
debug:disable_logs=false
# cursor.theme = ~/path/to/your/configs/hyprcursorssss
# env = HYPRCURSOR_THEM
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

exec-once = sleep 1 && hyprctl setcursor Bibata-Modern-Ice 24
# exec-once = ~/.local/bin/dynamic-borders.sh

# Hyprcursor (para apps nativos Wayland)
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# XCursor (muito importante pro VSCode e outros apps XWayland)
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# Força aplicação do cursor depois de iniciar
exec-once = sleep 1 && hyprctl setcursor Bibata-Modern-Ice 24

