# === Floating Rules ===
windowrule = float on, match:class ^(org\.kde\.dolphin)$, match:title ^(Progress Dialog Рђћ Dolphin)$
windowrule = float on, match:class ^(org\.kde\.dolphin)$, match:title ^(Copying Рђћ Dolphin)$
windowrule = float on, match:title ^(About Mozilla Firefox)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Library)$
windowrule = float on, match:class ^(kitty)$,   match:title ^(top|btop|htop)$
windowrule = float on, match:class ^(vlc)$
windowrule = float on, match:class ^(kvantummanager)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(org\.kde\.ark)$
windowrule = float on, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-applet)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(Signal)$
windowrule = float on, match:class ^(com\.github\.rafostar\.Clapper)$
windowrule = float on, match:class ^(app\.drey\.Warp)$
windowrule = float on, match:class ^(net\.davidotek\.pupgui2)$
windowrule = float on, match:class ^(yad)$
windowrule = float on, match:class ^(eog)$
windowrule = float on, match:class ^(io\.github\.alainm23\.planify)$
windowrule = float on, match:class ^(io\.gitlab\.theevilskeleton\.Upscaler)$
windowrule = float on, match:class ^(com\.github\.unrud\.VideoDownloader)$
windowrule = float on, match:class ^(io\.gitlab\.adhami3310\.Impression)$
windowrule = float on, match:class ^(io\.missioncenter\.MissionCenter)$

# === Size Rules ===
windowrule = size 900 350, match:class ^(org\.pulseaudio\.pavucontrol)$

# === Anny-dock ===
windowrule = fullscreen on, match:class ^(anny-dock)$
windowrule = no_blur on,    match:class ^(anny-dock)$
windowrule = immediate on,  match:class ^(anny-dock)$
windowrule = no_shadow on,  match:class ^(anny-dock)$
windowrule = border_size 0, match:class ^(anny-dock)$
windowrule = float on,      match:class ^(anny-dock)$
windowrule = pin on,        match:class ^(anny-dock)$

# === MPV ===
windowrule = float on,      match:class ^(mpv)$
windowrule = size 330 200,  match:class ^(mpv)$
windowrule = move 76% 70%,  match:class ^(mpv)$
windowrule = pin on,        match:class ^(mpv)$

# === Firefox Picture-in-Picture ===
windowrule = float on,                    match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = pin on,                      match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = size 150 150,                match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = move onscreen 100%-300 0,    match:class ^(firefox)$, match:title ^(Picture-in-Picture)$

# === Cava ===
windowrule = float on,          match:class ^(cava)$
windowrule = no_focus on,       match:class ^(cava)$
windowrule = border_size 0, match:class ^(cava)$
windowrule = size 1920 200,     match:class ^(cava)$
windowrule = move 0 880,        match:class ^(cava)$
windowrule = opacity 0.8,       match:class ^(cava)$
windowrule = workspace 6 silent, match:class ^(cava)$

# РќѕРќЉРќЉ РќёРќђРќѕ РќѕРќёРќѕ РќѕРќђРќђ РќѕРќђРќѕ   РќѕРќђРќѕ РќѕРќЉРќѕ РќѕРќЉРќЉ РќѕРќђРќђ РќѕРќђ
# РќѕРќёРќё РќѕРќђРќѕ РќЉРќѕРќЉ РќѕРќѕРќё РќѕРќђРќё   РќѕРќђРќё РќѕРќёРќѕ РќѕРќёРќё РќѕРќѕРќё РќёРќѕ

# === Layer Rules ===
layerrule = blur on,      match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on,      match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on,      match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on,      match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on,      match:namespace logout_dialog

# === Binds ===
bind = $mainMod SHIFT, V, exec, xava &