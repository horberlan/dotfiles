windowrule = opacity 0.80 0.70,  match:class ^(org\.freedesktop\.impl\.portal\.desktop\.hyprland)$
windowrule = opacity 0.70 0.70,  match:class ^([Ss]team)$
windowrule = opacity 0.70 0.70,  match:class ^(steamwebhelper)$
